<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema GX - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .animate-spin-slow { animation: spin 3s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        /* Estilo para mensajes de error internos */
        .error-toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #fee2e2;
            border: 1px solid #fecaca;
            color: #991b1b;
            padding: 1rem;
            border-radius: 0.75rem;
            z-index: 50;
            display: none;
        }
    </style>
</head>
<body class="bg-[#f8fafc]">

    <div id="app" class="min-h-screen flex items-center justify-center p-4">
        <!-- Esqueleto de carga inicial -->
        <div class="max-w-md w-full bg-white rounded-[2rem] shadow-2xl border border-gray-100 overflow-hidden">
            <div class="h-48 bg-gray-100 flex items-center justify-center">
                <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
            </div>
            <div class="p-8 space-y-4">
                <div class="h-4 bg-gray-100 rounded w-3/4 mx-auto"></div>
                <div class="h-10 bg-gray-50 rounded-xl"></div>
                <div class="h-10 bg-gray-50 rounded-xl"></div>
            </div>
        </div>
    </div>

    <div id="errorMsg" class="error-toast"></div>

    <!-- Firebase SDKs -->
    <script type="module">
        // Intentamos cargar Firebase con un bloque try/catch para el entorno virtual
        try {
            const firebaseBase = "https://www.gstatic.com/firebasejs/10.8.0/";
            const { initializeApp } = await import(`${firebaseBase}firebase-app.js`);
            const { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged, signOut } = await import(`${firebaseBase}firebase-auth.js`);
            const { getFirestore, doc, setDoc, getDoc } = await import(`${firebaseBase}firebase-firestore.js`);

            // CONFIGURACIÓN DE TU PROYECTO FIREBASE
            const firebaseConfig = {
                apiKey: "AIzaSyDx6ujtmDoNZ3fus4dYnNDoxjz-1KQYDXA",
                authDomain: "sistema-gx.firebaseapp.com",
                projectId: "sistema-gx",
                storageBucket: "sistema-gx.firebasestorage.app",
                messagingSenderId: "216811985666",
                appId: "1:216811985666:web:089da99f3aac9350c3401b",
                measurementId: "G-83SGCF1GFX"
            };

            // Inicialización
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const appId = 'sistema-gx';

            // --- CONFIGURACIÓN DE REDIRECCIÓN ---
            // Cambia este nombre por el de tu archivo real
            const REDIRECT_URL = "gx.html";

            const appContainer = document.getElementById('app');
            const errorToast = document.getElementById('errorMsg');

            function showError(msg) {
                errorToast.innerText = msg;
                errorToast.style.display = 'block';
                setTimeout(() => { errorToast.style.display = 'none'; }, 5000);
            }

            // Estado Global
            let currentUser = null;
            let userData = null;

            // Renderizador de Vistas
            function render(view) {
                if (currentUser && view !== 'dashboard') {
                    showDashboard();
                    return;
                }
                switch(view) {
                    case 'login': showLogin(); break;
                    case 'register': showRegister(); break;
                    case 'forgot': showForgot(); break;
                }
            }

            function showLogin() {
                appContainer.innerHTML = `
                    <div class="max-w-md w-full bg-white rounded-[2rem] shadow-2xl border border-gray-100 overflow-hidden animate-in fade-in duration-500">
                        <div class="bg-gradient-to-br from-blue-600 to-blue-800 p-10 text-white text-center">
                            <h1 class="text-3xl font-extrabold tracking-tight">Sistema Asistencia</h1>
                            <p class="text-blue-100/80 text-sm mt-2 font-medium">Inicia sesión para continuar</p>
                        </div>
                        <div class="p-8 lg:p-10">
                            <form id="loginForm" class="space-y-4">
                                <input type="email" id="email" placeholder="Correo electrónico" required class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                                <input type="password" id="password" placeholder="Contraseña" required class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                                <div class="text-right">
                                    <button type="button" onclick="window.render('forgot')" class="text-xs font-bold text-blue-600 uppercase tracking-widest hover:text-blue-800">¿Olvidaste tu clave?</button>
                                </div>
                                <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-[0.98] flex items-center justify-center">
                                    <span>Entrar al Sistema</span>
                                </button>
                                <p class="text-center text-gray-500 text-sm mt-6">¿No tienes cuenta? <button type="button" onclick="window.render('register')" class="text-blue-600 font-bold hover:underline">Regístrate</button></p>
                            </form>
                        </div>
                    </div>
                `;
                document.getElementById('loginForm').onsubmit = async (e) => {
                    e.preventDefault();
                    const btn = document.getElementById('submitBtn');
                    btn.disabled = true;
                    btn.innerHTML = '<div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>';
                    try {
                        await signInWithEmailAndPassword(auth, e.target.email.value, e.target.password.value);
                    } catch (err) { 
                        showError("Error: Credenciales inválidas o problema de red.");
                        btn.disabled = false;
                        btn.innerText = 'Entrar al Sistema';
                    }
                };
            }

            function showRegister() {
                appContainer.innerHTML = `
                    <div class="max-w-md w-full bg-white rounded-[2rem] shadow-2xl border border-gray-100 overflow-hidden animate-in slide-in-from-bottom-4 duration-500">
                        <div class="bg-slate-900 p-10 text-white text-center">
                            <h1 class="text-3xl font-extrabold tracking-tight">Registro</h1>
                            <p class="text-gray-400 text-sm mt-2 font-medium">Crea tu cuenta personalizada</p>
                        </div>
                        <div class="p-8 lg:p-10">
                            <form id="regForm" class="space-y-4">
                                <input type="text" id="name" placeholder="Tu nombre completo" required class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none">
                                <input type="email" id="email" placeholder="Correo electrónico" required class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none">
                                <input type="password" id="password" placeholder="Contraseña (min. 6)" required class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none">
                                <button type="submit" class="w-full bg-slate-900 hover:bg-black text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-[0.98]">Crear mi Cuenta</button>
                                <button type="button" onclick="window.render('login')" class="w-full mt-4 text-gray-400 text-sm font-medium hover:text-gray-600">Volver al login</button>
                            </form>
                        </div>
                    </div>
                `;
                document.getElementById('regForm').onsubmit = async (e) => {
                    e.preventDefault();
                    try {
                        const cred = await createUserWithEmailAndPassword(auth, e.target.email.value, e.target.password.value);
                        await setDoc(doc(db, 'artifacts', appId, 'users', cred.user.uid, 'profile', 'data'), {
                            name: e.target.name.value,
                            email: e.target.email.value,
                            joinedAt: new Date().toISOString(),
                            role: 'Usuario Registrado'
                        });
                        alert("Cuenta creada con éxito.");
                    } catch (err) { showError("Error al registrar: " + err.message); }
                };
            }

            function showForgot() {
                appContainer.innerHTML = `
                    <div class="max-w-md w-full bg-white rounded-[2rem] shadow-2xl border border-gray-100 overflow-hidden animate-in fade-in">
                        <div class="bg-blue-600 p-10 text-white text-center">
                            <h1 class="text-3xl font-extrabold tracking-tight">Recuperar</h1>
                        </div>
                        <div class="p-8 lg:p-10 text-center">
                            <p class="text-gray-500 text-sm mb-6">Te enviaremos un correo para cambiar tu clave.</p>
                            <form id="forgotForm" class="space-y-4 text-left">
                                <input type="email" id="email" placeholder="Introduce tu email" required class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none">
                                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all">Enviar correo</button>
                                <button type="button" onclick="window.render('login')" class="w-full mt-4 text-gray-400 text-sm font-medium">Volver</button>
                            </form>
                        </div>
                    </div>
                `;
                document.getElementById('forgotForm').onsubmit = async (e) => {
                    e.preventDefault();
                    try {
                        await sendPasswordResetEmail(auth, e.target.email.value);
                        alert("Correo de recuperación enviado.");
                        render('login');
                    } catch (err) { showError("Error: " + err.message); }
                };
            }

            async function showDashboard() {
                try {
                    if (!userData) {
                        const docSnap = await getDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'profile', 'data'));
                        userData = docSnap.exists() ? docSnap.data() : { name: currentUser.email.split('@')[0] };
                    }

                    appContainer.innerHTML = `
                        <div class="max-w-md w-full bg-white rounded-[2rem] shadow-2xl border border-gray-100 overflow-hidden p-8 text-center space-y-6 animate-in zoom-in duration-300">
                            <div class="w-24 h-24 bg-blue-50 rounded-full flex items-center justify-center border-2 border-blue-100 mx-auto">
                                <span class="text-blue-500 text-4xl font-bold">${userData.name[0].toUpperCase()}</span>
                            </div>
                            <div>
                                <h2 class="text-2xl font-black text-gray-800">Hola, ${userData.name}</h2>
                                <p class="text-blue-600 font-bold text-xs uppercase mt-1 tracking-widest">Acceso Concedido</p>
                            </div>
                            <div class="space-y-3">
                                <button onclick="window.location.href='oficial.html'" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-xl shadow-blue-100 transition-all flex items-center justify-center gap-2">
                                    Ir al Panel Principal
                                </button>
                                <button id="logoutBtn" class="w-full bg-white border-2 border-gray-100 text-gray-400 hover:text-red-500 hover:border-red-50 font-bold py-4 rounded-xl transition-all">Cerrar Sesión</button>
                            </div>
                        </div>
                    `;
                    document.getElementById('logoutBtn').onclick = () => signOut(auth);
                } catch (e) {
                    showError("Error al cargar el panel.");
                }
            }

            // Listener de Autenticación
            onAuthStateChanged(auth, (user) => {
                currentUser = user;
                if (user) {
                    showDashboard();
                } else {
                    userData = null;
                    render('login');
                }
            });

            window.render = render;

        } catch (error) {
            console.error("Error crítico de carga:", error);
            document.getElementById('app').innerHTML = `
                <div class="max-w-md w-full bg-white p-8 rounded-2xl shadow-xl text-center">
                    <div class="text-red-500 mb-4 font-bold">⚠️ Restricción del Entorno</div>
                    <p class="text-gray-600 text-sm">El previsualizador bloquea la conexión segura con Firebase.</p>
                    <p class="text-blue-600 text-sm mt-4 font-bold font-mono">Guarda este archivo como .html y ábrelo directamente en tu navegador para probarlo.</p>
                </div>
            `;
        }
    </script>
</body>
</html>
