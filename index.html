<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso al Sistema</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .auth-card { transition: all 0.3s ease; }
        .hidden { display: none; }
        .loader {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #3498db;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 8px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen p-4 font-sans text-slate-900">

    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md auth-card">
        <!-- Logo / Título -->
        <div class="text-center mb-8">
            <h1 id="auth-title" class="text-3xl font-bold text-slate-800">Bienvenido</h1>
            <p id="auth-subtitle" class="text-slate-500 mt-2">Ingresa tus credenciales para continuar</p>
        </div>

        <!-- Formulario Principal -->
        <form id="auth-form" class="space-y-4">
            <div id="email-field">
                <label class="block text-sm font-medium text-slate-700 mb-1">Correo Electrónico</label>
                <input type="email" id="email" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="correo@ejemplo.com">
            </div>

            <div id="password-field">
                <label class="block text-sm font-medium text-slate-700 mb-1">Contraseña</label>
                <input type="password" id="password" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="••••••••">
            </div>

            <button type="submit" id="submit-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg shadow-md transition-colors flex items-center justify-center">
                <span id="btn-loader" class="loader hidden"></span>
                <span id="btn-text">Entrar</span>
            </button>
        </form>

        <!-- Botones de Acción Secundaria -->
        <div class="mt-6 space-y-4 text-center">
            <button id="toggle-view" type="button" class="text-sm text-blue-600 hover:underline block w-full text-center">
                ¿No tienes cuenta? Regístrate
            </button>
            <button id="forgot-password" type="button" class="text-sm text-slate-500 hover:underline block w-full text-center border-t pt-2">
                ¿Olvidaste tu contraseña?
            </button>
        </div>

        <!-- Mensajes de Error/Éxito -->
        <div id="message-box" class="mt-4 p-3 rounded-lg hidden text-center text-sm font-medium"></div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Configuración segura
        let firebaseConfig = {};
        try {
            // Intentar obtener la configuración del entorno global
            const configStr = typeof __firebase_config !== 'undefined' ? __firebase_config : '{}';
            firebaseConfig = JSON.parse(configStr);
        } catch (e) {
            console.error("Error al cargar configuración de Firebase:", e);
        }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Referencias UI
        const authForm = document.getElementById('auth-form');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');
        const btnLoader = document.getElementById('btn-loader');
        const authTitle = document.getElementById('auth-title');
        const authSubtitle = document.getElementById('auth-subtitle');
        const toggleBtn = document.getElementById('toggle-view');
        const forgotBtn = document.getElementById('forgot-password');
        const msgBox = document.getElementById('message-box');
        const passwordField = document.getElementById('password-field');

        let mode = 'login'; 

        function showMessage(text, isError = true) {
            msgBox.textContent = text;
            msgBox.className = `mt-4 p-3 rounded-lg text-center text-sm font-medium ${isError ? 'bg-red-100 text-red-700 border border-red-200' : 'bg-green-100 text-green-700 border border-green-200'}`;
            msgBox.classList.remove('hidden');
        }

        function setLoading(isLoading) {
            submitBtn.disabled = isLoading;
            btnLoader.classList.toggle('hidden', !isLoading);
            btnText.textContent = isLoading ? "Procesando..." : (mode === 'login' ? "Entrar" : (mode === 'register' ? "Registrarme" : "Enviar Correo"));
        }

        // Navegación entre modos
        toggleBtn.onclick = (e) => {
            e.preventDefault();
            msgBox.classList.add('hidden');
            if (mode !== 'login') {
                mode = 'login';
                authTitle.textContent = "Bienvenido";
                authSubtitle.textContent = "Ingresa tus credenciales para continuar";
                btnText.textContent = "Entrar";
                toggleBtn.textContent = "¿No tienes cuenta? Regístrate";
                passwordField.classList.remove('hidden');
                passwordInput.required = true;
            } else {
                mode = 'register';
                authTitle.textContent = "Crear Cuenta";
                authSubtitle.textContent = "Regístrate para acceder al sistema";
                btnText.textContent = "Registrarme";
                toggleBtn.textContent = "¿Ya tienes cuenta? Inicia sesión";
                passwordField.classList.remove('hidden');
                passwordInput.required = true;
            }
        };

        forgotBtn.onclick = (e) => {
            e.preventDefault();
            mode = 'reset';
            authTitle.textContent = "Recuperar Acceso";
            authSubtitle.textContent = "Enviaremos un correo para cambiar tu clave";
            btnText.textContent = "Enviar Correo";
            passwordField.classList.add('hidden');
            passwordInput.required = false;
            toggleBtn.textContent = "Volver al inicio de sesión";
            msgBox.classList.add('hidden');
        };

        // Función de redirección segura
        function redirectToDashboard() {
            try {
                // Forzamos una ruta relativa válida para evitar el error de 'Location'
                window.location.replace('./gx.html');
            } catch (err) {
                console.error("Fallo de redirección:", err);
                window.location.href = 'gx.html';
            }
        }

        // Manejo de acciones con reintentos
        async function handleAuthAction(actionFn) {
            let delay = 1000;
            for (let i = 0; i < 5; i++) {
                try {
                    return await actionFn();
                } catch (error) {
                    if (i === 4 || (error.code && error.code.startsWith('auth/'))) throw error;
                    await new Promise(res => setTimeout(res, delay));
                    delay *= 2;
                }
            }
        }

        authForm.onsubmit = async (e) => {
            e.preventDefault();
            const email = emailInput.value;
            const password = passwordInput.value;
            msgBox.classList.add('hidden');
            setLoading(true);

            try {
                if (mode === 'login') {
                    await handleAuthAction(() => signInWithEmailAndPassword(auth, email, password));
                    redirectToDashboard();
                } else if (mode === 'register') {
                    await handleAuthAction(() => createUserWithEmailAndPassword(auth, email, password));
                    showMessage("¡Cuenta creada! Redirigiendo...", false);
                    setTimeout(redirectToDashboard, 1000);
                } else if (mode === 'reset') {
                    await handleAuthAction(() => sendPasswordResetEmail(auth, email));
                    showMessage("Correo enviado. Revisa tu bandeja de entrada.", false);
                }
            } catch (error) {
                console.error("Auth Error:", error.code);
                let errorMsg = "Error en la solicitud.";
                if (error.code === 'auth/invalid-credential') errorMsg = "Credenciales incorrectas.";
                if (error.code === 'auth/email-already-in-use') errorMsg = "Correo ya registrado.";
                showMessage(errorMsg);
            } finally {
                setLoading(false);
            }
        };

        // Inicialización y persistencia
        onAuthStateChanged(auth, (user) => {
            if (user && mode !== 'reset') {
                console.log("Sesión activa detectada:", user.email);
                redirectToDashboard();
            }
        });

        async function startApp() {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                try {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } catch (e) { 
                    console.warn("Token de sesión inicial no válido o expirado."); 
                }
            }
        }

        startApp();
    </script>
</body>
</html>
