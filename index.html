<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso al Sistema</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .auth-card { transition: all 0.3s ease; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen p-4 font-sans">

    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md auth-card">
        <!-- Logo / Título -->
        <div class="text-center mb-8">
            <h1 id="auth-title" class="text-3xl font-bold text-slate-800">Bienvenido</h1>
            <p id="auth-subtitle" class="text-slate-500 mt-2">Ingresa tus credenciales para continuar</p>
        </div>

        <!-- Formulario Principal -->
        <form id="auth-form" class="space-y-4">
            <div id="email-field">
                <label class="block text-sm font-medium text-slate-700 mb-1">Correo Electrónico</label>
                <input type="email" id="email" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="correo@ejemplo.com">
            </div>

            <div id="password-field">
                <label class="block text-sm font-medium text-slate-700 mb-1">Contraseña</label>
                <input type="password" id="password" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="••••••••">
            </div>

            <button type="submit" id="submit-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg shadow-md transition-colors">
                Entrar
            </button>
        </form>

        <!-- Botones de Acción Secundaria -->
        <div class="mt-6 space-y-2 text-center">
            <button id="toggle-view" class="text-sm text-blue-600 hover:underline">¿No tienes cuenta? Regístrate</button>
            <br>
            <button id="forgot-password" class="text-sm text-slate-500 hover:underline">¿Olvidaste tu contraseña?</button>
        </div>

        <!-- Mensajes de Error/Éxito -->
        <div id="message-box" class="mt-4 p-3 rounded-lg hidden text-center text-sm font-medium"></div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, signInWithCustomToken, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Referencias UI
        const authForm = document.getElementById('auth-form');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.getElementById('submit-btn');
        const authTitle = document.getElementById('auth-title');
        const authSubtitle = document.getElementById('auth-subtitle');
        const toggleBtn = document.getElementById('toggle-view');
        const forgotBtn = document.getElementById('forgot-password');
        const msgBox = document.getElementById('message-box');
        const passwordField = document.getElementById('password-field');

        let mode = 'login'; // login, register, reset

        // Manejo de Errores con Retries (Exponencial)
        async function handleAuthAction(actionFn) {
            let delay = 1000;
            for (let i = 0; i < 5; i++) {
                try {
                    return await actionFn();
                } catch (error) {
                    if (i === 4) throw error;
                    await new Promise(res => setTimeout(res, delay));
                    delay *= 2;
                }
            }
        }

        function showMessage(text, isError = true) {
            msgBox.textContent = text;
            msgBox.className = `mt-4 p-3 rounded-lg text-center text-sm font-medium ${isError ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}`;
            msgBox.classList.remove('hidden');
        }

        // Cambio entre vistas
        toggleBtn.addEventListener('click', () => {
            msgBox.classList.add('hidden');
            if (mode === 'login') {
                mode = 'register';
                authTitle.textContent = "Crear Cuenta";
                authSubtitle.textContent = "Regístrate para acceder al sistema";
                submitBtn.textContent = "Registrarme";
                toggleBtn.textContent = "¿Ya tienes cuenta? Inicia sesión";
                passwordField.classList.remove('hidden');
                passwordInput.required = true;
            } else {
                mode = 'login';
                authTitle.textContent = "Bienvenido";
                authSubtitle.textContent = "Ingresa tus credenciales para continuar";
                submitBtn.textContent = "Entrar";
                toggleBtn.textContent = "¿No tienes cuenta? Regístrate";
                passwordField.classList.remove('hidden');
                passwordInput.required = true;
            }
        });

        forgotBtn.addEventListener('click', () => {
            mode = 'reset';
            authTitle.textContent = "Recuperar Acceso";
            authSubtitle.textContent = "Enviaremos un correo para cambiar tu clave";
            submitBtn.textContent = "Enviar Correo";
            passwordField.classList.add('hidden');
            passwordInput.required = false;
            toggleBtn.textContent = "Volver al inicio de sesión";
            msgBox.classList.add('hidden');
        });

        // Lógica del Formulario
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = emailInput.value;
            const password = passwordInput.value;
            msgBox.classList.add('hidden');

            try {
                if (mode === 'login') {
                    await handleAuthAction(() => signInWithEmailAndPassword(auth, email, password));
                    window.location.href = 'gx.html';
                } else if (mode === 'register') {
                    await handleAuthAction(() => createUserWithEmailAndPassword(auth, email, password));
                    showMessage("Cuenta creada con éxito. Redirigiendo...", false);
                    setTimeout(() => window.location.href = 'gx.html', 1500);
                } else if (mode === 'reset') {
                    await handleAuthAction(() => sendPasswordResetEmail(auth, email));
                    showMessage("Correo de recuperación enviado. Revisa tu bandeja.", false);
                }
            } catch (error) {
                let errorMsg = "Ocurrió un error inesperado.";
                if (error.code === 'auth/user-not-found') errorMsg = "Usuario no encontrado.";
                if (error.code === 'auth/wrong-password') errorMsg = "Contraseña incorrecta.";
                if (error.code === 'auth/email-already-in-use') errorMsg = "Este correo ya está registrado.";
                if (error.code === 'auth/weak-password') errorMsg = "La contraseña es muy débil.";
                showMessage(errorMsg);
            }
        });

        // Inicialización de Auth del entorno
        window.onload = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            }
        };
    </script>
</body>
</html>
