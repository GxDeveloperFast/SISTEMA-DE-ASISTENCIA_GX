<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA GX - Gestión de Asistencia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .sidebar-item { cursor: pointer; transition: all 0.2s; border-radius: 8px; }
        .sidebar-item:hover { background-color: #f1f5f9; }
        .sidebar-item.active { background-color: #1e293b; color: white !important; }
        .sidebar-item.active i { color: white !important; }
    </style>
</head>
<body class="flex h-screen overflow-hidden bg-[#f4f7fe]">

    <!-- Sidebar Lateral -->
    <aside class="w-64 bg-white border-r border-gray-100 flex flex-col h-full shrink-0">
        <div class="p-6">
            <div class="flex items-center gap-3">
                <div class="bg-[#1e293b] text-white p-2 rounded-lg shadow-lg">
                    <span class="font-black text-sm">GX</span>
                </div>
                <div>
                    <h1 class="font-bold text-slate-800 leading-none text-sm uppercase tracking-tight">Sistema GX</h1>
                    <span class="text-[10px] text-slate-400 font-bold uppercase">Admin Panel</span>
                </div>
            </div>
        </div>

        <nav class="flex-1 px-4 space-y-1">
            <div onclick="switchTab('asistencia')" id="nav-asistencia" class="sidebar-item active flex items-center gap-3 px-4 py-3 text-sm font-bold text-slate-500">
                <i class="fas fa-calendar-check w-5"></i> ASISTENCIA
            </div>
            <div onclick="switchTab('personal')" id="nav-personal" class="sidebar-item flex items-center gap-3 px-4 py-3 text-sm font-bold text-slate-500">
                <i class="fas fa-users w-5"></i> PERSONAL
            </div>
            <div onclick="switchTab('archivo')" id="nav-archivo" class="sidebar-item flex items-center gap-3 px-4 py-3 text-sm font-bold text-slate-500">
                <i class="fas fa-archive w-5"></i> ARCHIVO
            </div>
        </nav>

        <div class="p-4 border-t border-gray-50">
            <button onclick="window.location.href='index.html'" class="w-full flex items-center gap-2 px-4 py-3 text-[11px] font-black text-rose-500 hover:bg-rose-50 rounded-lg transition-all uppercase">
                <span>Salir del sistema</span> <i class="fas fa-sign-out-alt ml-auto"></i>
            </button>
        </div>
    </aside>

    <!-- Contenedor de Vistas -->
    <main class="flex-1 flex flex-col min-w-0 h-full relative">
        
        <!-- HEADER COMÚN -->
        <header class="h-16 flex items-center justify-between px-8 bg-transparent">
            <div id="status-container" class="flex items-center gap-2">
                <div id="status-dot" class="w-2 h-2 bg-gray-300 rounded-full"></div>
                <span id="status-text" class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Sincronizando...</span>
            </div>
            <div class="flex items-center gap-3">
                <button class="bg-[#56b381] hover:bg-[#469e6f] text-white px-4 py-2 rounded-lg font-bold text-[11px] flex items-center gap-2 shadow-sm transition-all uppercase">
                    <i class="fas fa-file-excel"></i> Descargar Excel
                </button>
                <button class="bg-[#0f172a] hover:bg-black text-white px-4 py-2 rounded-lg font-bold text-[11px] flex items-center gap-2 shadow-sm transition-all uppercase">
                    <i class="fas fa-lock text-[9px]"></i> Cerrar Mes
                </button>
                <div class="w-8 h-8 bg-slate-200 rounded-lg flex items-center justify-center text-slate-500">
                    <i class="fas fa-user text-xs"></i>
                </div>
            </div>
        </header>

        <!-- VISTA: ASISTENCIA -->
        <section id="view-asistencia" class="p-8 pt-4 overflow-y-auto block h-full">
            <div class="mb-6 flex justify-between items-end">
                <div>
                    <h2 class="text-[10px] font-black text-indigo-500 uppercase tracking-widest mb-1">Registro Mensual</h2>
                    <h3 class="text-2xl font-black text-slate-800">Control de Entradas</h3>
                </div>
                <div class="text-right">
                    <span id="current-date" class="text-xs font-bold text-slate-400 bg-white border border-gray-100 px-3 py-1 rounded-lg">--/--/----</span>
                </div>
            </div>

            <div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-white border-b border-gray-100">
                            <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase">Usuario</th>
                            <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase text-center">ID / DNI</th>
                            <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase text-center">Hora</th>
                            <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase text-center">Fecha</th>
                            <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase text-center">Estado</th>
                        </tr>
                    </thead>
                    <tbody id="table-content">
                        <!-- Cargando... -->
                        <tr>
                            <td colspan="5" class="py-20 text-center">
                                <div class="flex justify-center gap-1">
                                    <div class="w-1.5 h-4 bg-indigo-500 animate-bounce"></div>
                                    <div class="w-1.5 h-4 bg-indigo-500 animate-bounce [animation-delay:0.2s]"></div>
                                    <div class="w-1.5 h-4 bg-indigo-500 animate-bounce [animation-delay:0.4s]"></div>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- VISTA: PERSONAL (Placeholder) -->
        <section id="view-personal" class="p-8 pt-4 hidden h-full">
            <h2 class="text-2xl font-black text-slate-800 mb-6">Gestión de Personal</h2>
            <div class="bg-white p-10 rounded-xl border border-gray-100 text-center">
                <i class="fas fa-users-cog text-4xl text-slate-200 mb-4"></i>
                <p class="text-slate-400 font-bold text-sm">Módulo de edición de personal en desarrollo.</p>
            </div>
        </section>

        <!-- VISTA: ARCHIVO (Placeholder) -->
        <section id="view-archivo" class="p-8 pt-4 hidden h-full">
            <h2 class="text-2xl font-black text-slate-800 mb-6">Archivo Histórico</h2>
            <div class="bg-white p-10 rounded-xl border border-gray-100 text-center">
                <i class="fas fa-archive text-4xl text-slate-200 mb-4"></i>
                <p class="text-slate-400 font-bold text-sm">Consulta de meses anteriores.</p>
            </div>
        </section>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDx6ujtmDoNZ3fus4dYnNDoxjz-1KQYDXA",
            authDomain: "sistema-gx.firebaseapp.com",
            projectId: "sistema-gx",
            storageBucket: "sistema-gx.firebasestorage.app",
            messagingSenderId: "216811985666",
            appId: "1:216811985666:web:089da99f3aac9350c3401b",
            measurementId: "G-83SGCF1GFX"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- Navegación ---
        window.switchTab = function(tabName) {
            // Ocultar todas las secciones
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            // Mostrar la seleccionada
            document.getElementById('view-' + tabName).classList.remove('hidden');
            
            // Actualizar estilo del menu
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
            document.getElementById('nav-' + tabName).classList.add('active');
        };

        // --- Lógica de Asistencia ---
        const tableContent = document.getElementById('table-content');
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');
        const dateDisplay = document.getElementById('current-date');

        dateDisplay.innerText = new Date().toLocaleDateString();

        signInAnonymously(auth).then(() => {
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    const usersRef = collection(db, "artifacts", "sistema-gx", "public", "data", "users");
                    
                    onSnapshot(usersRef, (snapshot) => {
                        statusDot.className = "w-2 h-2 bg-emerald-500";
                        statusText.innerText = "SISTEMA EN LÍNEA";
                        statusText.className = "text-[10px] font-black text-emerald-600 uppercase tracking-widest";

                        if (snapshot.empty) {
                            tableContent.innerHTML = `<tr><td colspan="5" class="py-20 text-center text-slate-300 font-bold text-xs uppercase">Sin registros públicos</td></tr>`;
                            return;
                        }

                        let html = "";
                        snapshot.forEach(doc => {
                            const d = doc.data();
                            html += `
                                <tr class="border-b border-gray-50 hover:bg-slate-50/50 transition-colors">
                                    <td class="px-6 py-4">
                                        <div class="flex items-center gap-3">
                                            <div class="w-8 h-8 bg-indigo-50 text-indigo-500 rounded flex items-center justify-center text-[10px] font-black">
                                                ${(d.nombre || 'U').charAt(0)}
                                            </div>
                                            <span class="text-sm font-bold text-slate-700">${d.nombre || '---'}</span>
                                        </div>
                                    </td>
                                    <td class="px-6 py-4 text-xs text-slate-500 font-bold text-center">${d.id || d.dni || '---'}</td>
                                    <td class="px-6 py-4 text-xs font-black text-slate-800 text-center">${d.hora || d.entrada || '--:--'}</td>
                                    <td class="px-6 py-4 text-xs text-slate-400 text-center font-bold">${d.fecha || '--/--/--'}</td>
                                    <td class="px-6 py-4 text-center">
                                        <span class="px-2 py-1 bg-emerald-50 text-emerald-600 rounded text-[9px] font-black uppercase tracking-tighter">Registrado</span>
                                    </td>
                                </tr>
                            `;
                        });
                        tableContent.innerHTML = html;
                    });
                }
            });
        }).catch(e => {
            statusDot.className = "w-2 h-2 bg-rose-500";
            statusText.innerText = "Error de Conexión";
        });

    </script>
</body>
</html>
