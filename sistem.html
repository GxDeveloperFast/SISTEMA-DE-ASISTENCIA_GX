<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA GX - Gestión de Asistencia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .sidebar-item-active { background-color: #1e293b; color: white; border-radius: 12px; }
        .loading-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-72 bg-white border-r border-slate-200 flex flex-col p-6">
        <div class="flex items-center gap-3 mb-10 px-2">
            <div class="bg-indigo-600 text-white p-2 rounded-lg">
                <i class="fas fa-th-large"></i>
            </div>
            <div>
                <h1 class="font-black text-slate-800 leading-none text-lg">SISTEMA GX</h1>
                <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Admin Panel</span>
            </div>
        </div>

        <nav class="space-y-1 flex-1">
            <a href="#" class="sidebar-item-active flex items-center gap-3 px-4 py-3 text-sm font-bold transition-all">
                <i class="fas fa-calendar-check w-5 text-center"></i> ASISTENCIA
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 text-sm font-bold text-slate-400 hover:text-slate-600 transition-all">
                <i class="fas fa-users w-5 text-center"></i> PERSONAL
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 text-sm font-bold text-slate-400 hover:text-slate-600 transition-all">
                <i class="fas fa-archive w-5 text-center"></i> ARCHIVO
            </a>
        </nav>

        <div class="pt-6 border-t border-slate-100">
            <button onclick="window.location.href='index.html'" class="w-full flex items-center justify-center gap-2 py-3 text-xs font-black text-rose-500 hover:bg-rose-50 rounded-xl transition-all">
                SALIR DEL SISTEMA <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </aside>

    <!-- Contenido Principal -->
    <main class="flex-1 flex flex-col min-w-0">
        <!-- Header -->
        <header class="h-20 bg-white border-b border-slate-200 flex items-center justify-between px-8">
            <div id="connection-status" class="flex items-center gap-2">
                <div class="w-2 h-2 bg-amber-500 rounded-full loading-pulse"></div>
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Sincronizando con Cloud Firestore...</span>
            </div>
            
            <div class="flex items-center gap-4">
                <button class="bg-emerald-500 hover:bg-emerald-600 text-white px-5 py-2 rounded-lg font-bold text-xs flex items-center gap-2 transition-all shadow-lg shadow-emerald-100">
                    <i class="fas fa-file-excel"></i> DESCARGAR EXCEL
                </button>
                <div class="h-10 w-10 bg-slate-800 text-white rounded-lg flex items-center justify-center">
                    <i class="fas fa-user-shield text-sm"></i>
                </div>
            </div>
        </header>

        <!-- Tabla -->
        <div class="p-8 overflow-y-auto">
            <div class="mb-6 flex justify-between items-end">
                <div>
                    <h2 class="text-[10px] font-black text-indigo-500 uppercase tracking-[0.2em] mb-1">Registro Mensual</h2>
                    <h3 class="text-2xl font-black text-slate-800">Control de Entradas</h3>
                </div>
                <div class="text-right">
                    <span id="current-date" class="text-xs font-bold text-slate-400 bg-slate-100 px-3 py-1 rounded-full">--/--/----</span>
                </div>
            </div>

            <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50/50 border-b border-slate-200">
                            <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase">Usuario</th>
                            <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase text-center">ID / DNI</th>
                            <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase text-center">Hora</th>
                            <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase text-center">Fecha</th>
                            <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase text-center">Estado</th>
                        </tr>
                    </thead>
                    <tbody id="table-content">
                        <!-- Estado inicial de carga -->
                        <tr>
                            <td colspan="5" class="px-6 py-20 text-center">
                                <div class="flex flex-col items-center gap-4">
                                    <div class="flex gap-1">
                                        <div class="w-2 h-2 bg-indigo-500 rounded-full animate-bounce"></div>
                                        <div class="w-2 h-2 bg-indigo-500 rounded-full animate-bounce [animation-delay:0.2s]"></div>
                                        <div class="w-2 h-2 bg-indigo-500 rounded-full animate-bounce [animation-delay:0.4s]"></div>
                                    </div>
                                    <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Buscando registros...</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- FIREBASE SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // Configuración oficial de tu proyecto
        const firebaseConfig = {
            apiKey: "AIzaSyDx6ujtmDoNZ3fus4dYnNDoxjz-1KQYDXA",
            authDomain: "sistema-gx.firebaseapp.com",
            projectId: "sistema-gx",
            storageBucket: "sistema-gx.firebasestorage.app",
            messagingSenderId: "216811985666",
            appId: "1:216811985666:web:089da99f3aac9350c3401b",
            measurementId: "G-83SGCF1GFX"
        };

        // Inicialización
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const tableContent = document.getElementById('table-content');
        const connectionStatus = document.getElementById('connection-status');
        const dateDisplay = document.getElementById('current-date');

        // Mostrar fecha actual
        const now = new Date();
        dateDisplay.innerText = now.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' });

        // Autenticación anónima para cumplir con las reglas de seguridad
        signInAnonymously(auth).catch(err => console.error("Error Auth:", err));

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Ruta: artifacts -> sistema-gx -> public -> data -> users
                // Nota: Ajustamos la ruta según las nuevas reglas de seguridad globales
                const usersCollection = collection(db, "artifacts", "sistema-gx", "public", "data", "users");

                onSnapshot(usersCollection, (snapshot) => {
                    connectionStatus.innerHTML = `
                        <div class="w-2 h-2 bg-emerald-500 rounded-full"></div>
                        <span class="text-[10px] font-black text-emerald-600 uppercase tracking-widest">Sistema en Línea</span>
                    `;

                    if (snapshot.empty) {
                        tableContent.innerHTML = `
                            <tr>
                                <td colspan="5" class="px-6 py-20 text-center text-slate-400">
                                    <i class="fas fa-folder-open text-4xl mb-3 opacity-20"></i>
                                    <p class="font-bold text-xs uppercase tracking-widest">Sin registros en la base de datos pública</p>
                                </td>
                            </tr>
                        `;
                        return;
                    }

                    let html = "";
                    snapshot.forEach((doc) => {
                        const data = doc.data();
                        html += `
                            <tr class="border-b border-slate-100 hover:bg-slate-50/80 transition-colors">
                                <td class="px-6 py-4">
                                    <div class="flex items-center gap-3">
                                        <div class="w-9 h-9 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center text-xs font-black border border-indigo-100">
                                            ${(data.nombre || 'U').charAt(0).toUpperCase()}
                                        </div>
                                        <span class="text-sm font-bold text-slate-700">${data.nombre || 'Desconocido'}</span>
                                    </div>
                                </td>
                                <td class="px-6 py-4 text-sm text-slate-500 font-medium text-center">${data.id || data.dni || '---'}</td>
                                <td class="px-6 py-4 text-sm font-black text-slate-800 text-center">${data.hora || data.entrada || '--:--'}</td>
                                <td class="px-6 py-4 text-sm text-slate-400 text-center font-medium">${data.fecha || '--/--/--'}</td>
                                <td class="px-6 py-4 text-center">
                                    <span class="px-3 py-1 bg-emerald-100 text-emerald-700 rounded-full text-[9px] font-black uppercase tracking-tighter">Registrado</span>
                                </td>
                            </tr>
                        `;
                    });
                    tableContent.innerHTML = html;
                }, (error) => {
                    console.error("Firestore Error:", error);
                    connectionStatus.innerHTML = `
                        <div class="w-2 h-2 bg-rose-500 rounded-full"></div>
                        <span class="text-[10px] font-black text-rose-600 uppercase tracking-widest">Error de Acceso</span>
                    `;
                });
            }
        });
    </script>
</body>
</html>
